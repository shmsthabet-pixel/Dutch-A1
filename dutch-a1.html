<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Dutch A1 — Complete Course</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Nunito+Sans:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e1117;
  --s1: #161b27;
  --s2: #1e2535;
  --s3: #252d3d;
  --s4: #2e3850;
  --br: #334060;
  --br2: #3d4d6a;
  --t1: #e8edf8;
  --t2: #8a9bc0;
  --t3: #4a5878;
  --t4: #2e3850;
  --green: #22c55e;
  --gd: #16a34a;
  --gb: rgba(34,197,94,.12);
  --blue: #38bdf8;
  --bd: #0ea5e9;
  --bb: rgba(56,189,248,.12);
  --orange: #fb923c;
  --od: #ea580c;
  --ob: rgba(251,146,60,.12);
  --purple: #a78bfa;
  --pd: #7c3aed;
  --pb: rgba(167,139,250,.12);
  --yellow: #fbbf24;
  --yb: rgba(251,191,36,.12);
  --red: #f87171;
  --rb: rgba(248,113,113,.12);
  --pink: #f472b6;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--t1);
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background-image: radial-gradient(ellipse at 20% 0%, rgba(56,189,248,.04) 0%, transparent 60%),
                    radial-gradient(ellipse at 80% 100%, rgba(167,139,250,.04) 0%, transparent 60%);
}

/* ── HEADER ── */
header {
  background: rgba(22,27,39,.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--br);
  padding: 0 20px;
  height: 62px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 200;
}

.logo { display: flex; align-items: center; gap: 12px; }

.logo-flag {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, var(--green), #16a34a);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  box-shadow: 0 4px 0 #0f6b30, 0 0 20px rgba(34,197,94,.2);
}

.logo-text { display: flex; flex-direction: column; gap: 1px; }

.logo-title {
  font-size: 18px; font-weight: 900; color: var(--t1);
  letter-spacing: -.3px; line-height: 1;
}

.logo-sub {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px; color: var(--green);
  text-transform: uppercase; letter-spacing: 2.5px;
}

.header-right { display: flex; align-items: center; gap: 10px; }

.streak {
  display: flex; align-items: center; gap: 6px;
  background: var(--s2); border: 1px solid var(--br);
  border-radius: 20px; padding: 6px 13px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px; color: var(--t2);
}

.streak-num { color: var(--yellow); font-size: 15px; font-weight: 700; }

.progress-pill {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px; color: var(--t3);
  background: var(--s2); border: 1px solid var(--br);
  border-radius: 20px; padding: 6px 12px;
  letter-spacing: 1px;
}

/* ── LAYOUT ── */
.app { display: flex; flex: 1; max-width: 1280px; margin: 0 auto; width: 100%; }

/* ── SIDEBAR ── */
.sidebar {
  width: 260px; flex-shrink: 0;
  border-right: 1px solid var(--br);
  height: calc(100vh - 62px);
  overflow-y: auto; position: sticky; top: 62px;
  background: var(--s1);
  padding: 10px 8px;
}
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--br); border-radius: 2px; }

.phase-block { margin-bottom: 6px; }

.phase-header {
  padding: 12px 8px 5px;
  display: flex; align-items: center; gap: 8px;
}

.phase-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

.phase-name {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px; text-transform: uppercase;
  letter-spacing: 2px; color: var(--t3);
}

.day-btn {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: 10px;
  cursor: pointer; transition: all .15s;
  border: 1px solid transparent;
  width: 100%; text-align: left; background: transparent;
  margin-bottom: 2px;
}
.day-btn:hover:not(.locked) { background: var(--s2); border-color: var(--br); }
.day-btn.active {
  background: var(--s3); border-color: var(--bd);
  box-shadow: 0 0 12px rgba(56,189,248,.1);
}
.day-btn.locked { opacity: .3; cursor: not-allowed; }

.day-indicator {
  width: 32px; height: 32px; border-radius: 50%;
  border: 2px solid var(--br); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 900;
  font-family: 'Share Tech Mono', monospace;
  color: var(--t3); background: var(--s2);
  transition: all .2s;
}
.day-btn.done .day-indicator {
  background: var(--green); border-color: var(--gd);
  color: #fff; font-size: 14px;
  box-shadow: 0 3px 0 var(--gd), 0 0 10px rgba(34,197,94,.3);
}
.day-btn.active .day-indicator {
  background: var(--blue); border-color: var(--bd);
  color: #fff;
  box-shadow: 0 3px 0 var(--bd), 0 0 12px rgba(56,189,248,.4);
  animation: glow 2s infinite;
}
@keyframes glow {
  0%,100% { box-shadow: 0 3px 0 var(--bd), 0 0 10px rgba(56,189,248,.3); }
  50% { box-shadow: 0 3px 0 var(--bd), 0 0 20px rgba(56,189,248,.6); }
}

.day-meta { flex: 1; min-width: 0; }
.day-num-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px; color: var(--t3);
  text-transform: uppercase; letter-spacing: 1px;
}
.day-name { font-size: 12px; font-weight: 800; color: var(--t2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
.day-btn.active .day-name { color: var(--t1); }

/* ── MAIN ── */
.main {
  flex: 1; padding: 28px 36px 60px;
  overflow-y: auto; height: calc(100vh - 62px);
}
.main::-webkit-scrollbar { width: 4px; }
.main::-webkit-scrollbar-thumb { background: var(--br); border-radius: 2px; }

/* ── DAY HERO ── */
.day-hero {
  background: linear-gradient(135deg, var(--s1) 0%, var(--s2) 100%);
  border: 1px solid var(--br);
  border-radius: 20px; padding: 26px;
  margin-bottom: 26px; position: relative; overflow: hidden;
}
.day-hero::before {
  content: '';
  position: absolute; top: -60px; right: -60px;
  width: 200px; height: 200px; border-radius: 50%;
  background: radial-gradient(circle, rgba(56,189,248,.08), transparent 70%);
  pointer-events: none;
}

.hero-eyebrow { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }

.phase-badge {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px; text-transform: uppercase;
  letter-spacing: 2px; padding: 4px 10px;
  border-radius: 20px; border: 1px solid;
  font-weight: 700;
}

.day-badge {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px; text-transform: uppercase;
  letter-spacing: 2px; color: var(--t3);
}

.hero-title {
  font-size: 30px; font-weight: 900;
  line-height: 1.05; letter-spacing: -.5px;
  margin-bottom: 8px; color: var(--t1);
}

.hero-sub { font-size: 14px; color: var(--t2); font-family: 'Nunito Sans', sans-serif; line-height: 1.55; max-width: 520px; }

.hero-meta { display: flex; align-items: center; gap: 16px; margin-top: 16px; flex-wrap: wrap; }

.meta-item {
  display: flex; align-items: center; gap: 6px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px; color: var(--t3); letter-spacing: .5px;
  background: var(--s3); border: 1px solid var(--br);
  border-radius: 20px; padding: 4px 10px;
}
.meta-item.done-meta { color: var(--green); border-color: rgba(34,197,94,.3); }

/* ── SECTIONS ── */
.section { margin-bottom: 24px; }

.section-head {
  display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
}

.section-icon {
  width: 30px; height: 30px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; flex-shrink: 0;
}

.section-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px; text-transform: uppercase;
  letter-spacing: 2px; color: var(--t2); font-weight: 700;
}

.section-line { flex: 1; height: 1px; background: var(--br); }

/* ── PHRASE CARDS ── */
.phrases-grid { display: grid; gap: 8px; }

.phrase-card {
  background: var(--s1); border: 1px solid var(--br);
  border-radius: 12px; padding: 13px 16px;
  display: flex; justify-content: space-between; align-items: center;
  gap: 12px; transition: all .15s; cursor: default;
}
.phrase-card:hover {
  border-color: var(--blue);
  background: var(--s2);
  transform: translateX(3px);
  box-shadow: -3px 0 0 var(--blue);
}

.p-dutch { font-size: 16px; font-weight: 900; color: var(--t1); }
.p-right { text-align: right; flex-shrink: 0; }
.p-english { font-size: 12px; color: var(--t2); font-family: 'Nunito Sans', sans-serif; }
.p-pronounce {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px; color: var(--blue); margin-top: 3px; font-weight: 700;
}

/* ── GRAMMAR ── */
.grammar-card {
  background: var(--s1); border: 1px solid var(--br);
  border-left: 3px solid var(--blue);
  border-radius: 0 12px 12px 0; padding: 18px 20px;
}

.grammar-rule {
  font-size: 13px; font-family: 'Nunito Sans', sans-serif;
  color: var(--t2); line-height: 1.75; margin-bottom: 10px;
  padding: 8px 12px; border-radius: 8px;
  background: var(--s2); border: 1px solid var(--br);
}
.grammar-rule:last-child { margin-bottom: 0; }

.hl { color: var(--orange); font-weight: 800; }
.hl-b { color: var(--blue); font-weight: 700; }
.hl-g { color: var(--green); font-weight: 700; }
.hl-gold { color: var(--yellow); }
.hl-big { font-size: 16px; font-weight: 900; }

/* ── SENTENCES ── */
.sentence-card {
  background: var(--s1); border: 1px solid var(--br);
  border-radius: 12px; padding: 15px 18px; margin-bottom: 9px;
}
.s-dutch { font-size: 20px; font-weight: 900; color: var(--t1); margin-bottom: 4px; }
.s-english { font-size: 12px; color: var(--t2); font-family: 'Nunito Sans', sans-serif; margin-bottom: 10px; }

.chips { display: flex; flex-wrap: wrap; gap: 5px; }
.chip {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px; padding: 3px 8px; border-radius: 5px;
  border: 1px solid var(--br); color: var(--t3); background: var(--s3);
}
.chip.s { border-color: rgba(56,189,248,.4); color: var(--blue); background: var(--bb); }
.chip.v { border-color: rgba(251,146,60,.4); color: var(--orange); background: var(--ob); }
.chip.o { border-color: rgba(34,197,94,.4); color: var(--green); background: var(--gb); }

/* ── VOCAB TABLE ── */
.vocab-table {
  width: 100%; border-collapse: collapse;
  border: 1px solid var(--br); border-radius: 12px; overflow: hidden; font-size: 13px;
}
.vocab-table th {
  background: var(--s3);
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px; text-transform: uppercase;
  letter-spacing: 1.5px; color: var(--t3);
  padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--br);
}
.vocab-table td {
  padding: 10px 14px; border-bottom: 1px solid var(--br);
  background: var(--s1); vertical-align: middle;
}
.vocab-table tr:last-child td { border-bottom: none; }
.vocab-table tr:hover td { background: var(--s2); }
.v-dutch { font-size: 15px; font-weight: 900; color: var(--t1); }
.ven { color: var(--t2); font-family: 'Nunito Sans', sans-serif; }
.vnote { color: var(--t3); font-size: 11px; font-family: 'Share Tech Mono', monospace; }
.gtag {
  display: inline-block; font-family: 'Share Tech Mono', monospace;
  font-size: 9px; font-weight: 700; padding: 2px 6px;
  border-radius: 4px; margin-left: 5px; vertical-align: middle;
}
.g-de { background: var(--bb); color: var(--blue); border: 1px solid rgba(56,189,248,.3); }
.g-het { background: var(--gb); color: var(--green); border: 1px solid rgba(34,197,94,.3); }

/* ── INSIGHTS ── */
.insights-card {
  background: var(--s1); border: 1px solid rgba(251,191,36,.25);
  border-left: 3px solid var(--yellow);
  border-radius: 0 12px 12px 0; padding: 16px 20px;
}
.insight-row {
  display: flex; gap: 11px; margin-bottom: 12px;
  font-size: 13px; font-family: 'Nunito Sans', sans-serif;
  color: var(--t2); line-height: 1.65; align-items: flex-start;
}
.insight-row:last-child { margin-bottom: 0; }
.i-icon { flex-shrink: 0; font-size: 16px; margin-top: 1px; }

/* ── MISTAKES ── */
.mistakes-card {
  background: var(--s1); border: 1px solid rgba(248,113,113,.25);
  border-left: 3px solid var(--red);
  border-radius: 0 12px 12px 0; padding: 16px 20px;
}
.mistake-row { margin-bottom: 14px; }
.mistake-row:last-child { margin-bottom: 0; }
.mtop { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 5px; }
.m-wrong { font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--red); text-decoration: line-through; }
.m-arrow { color: var(--t3); font-size: 12px; }
.m-right { font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--green); font-weight: 700; }
.m-why { font-size: 12px; font-family: 'Nunito Sans', sans-serif; color: var(--t2); line-height: 1.55; }

/* ── CULTURAL ── */
.cultural-card {
  background: linear-gradient(135deg, var(--ob), var(--bb));
  border: 1px solid var(--br); border-radius: 12px;
  padding: 18px 20px; font-size: 13px;
  font-family: 'Nunito Sans', sans-serif; color: var(--t2); line-height: 1.75;
}
.cultural-card::before { content: '🌷'; display: block; font-size: 22px; margin-bottom: 10px; }

/* ── DIALOGUE ── */
.dlg-card {
  background: var(--s1); border: 1px solid var(--br);
  border-radius: 12px; overflow: hidden;
}
.d-line {
  display: flex; gap: 12px; padding: 12px 16px;
  border-bottom: 1px solid var(--br); align-items: flex-start;
}
.d-line:last-child { border-bottom: none; }
.d-line.d-b { background: var(--bb); }
.d-speaker {
  font-family: 'Share Tech Mono', monospace; font-size: 9px;
  text-transform: uppercase; letter-spacing: 1px;
  color: var(--t3); width: 22px; flex-shrink: 0; padding-top: 3px;
}
.d-dutch { font-size: 15px; font-weight: 900; color: var(--t1); }
.d-en { font-size: 11px; color: var(--t3); margin-top: 2px; font-family: 'Nunito Sans', sans-serif; }

/* ── COMPLETE BTN ── */
.actions { margin-top: 30px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

.complete-btn {
  padding: 14px 28px;
  font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 900;
  border: none; border-radius: 12px; cursor: pointer;
  transition: all .15s; letter-spacing: .3px;
  display: flex; align-items: center; gap: 8px;
  background: var(--green); color: #fff;
  box-shadow: 0 4px 0 var(--gd), 0 0 20px rgba(34,197,94,.25);
}
.complete-btn:hover {
  background: #2dda6e; transform: translateY(-2px);
  box-shadow: 0 6px 0 var(--gd), 0 0 30px rgba(34,197,94,.4);
}
.complete-btn:active { transform: translateY(1px); box-shadow: 0 2px 0 var(--gd); }
.complete-btn.is-done {
  background: var(--s3); color: var(--green);
  border: 2px solid rgba(34,197,94,.3);
  box-shadow: none; cursor: default; transform: none;
}

.next-btn {
  padding: 14px 22px;
  font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 800;
  background: var(--s2); color: var(--t2);
  border: 1px solid var(--br); border-radius: 12px;
  cursor: pointer; transition: all .15s;
}
.next-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--bb); }

/* ── LOCKED ── */
.locked-view {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 80px 40px; text-align: center; gap: 12px;
}
.locked-view .lock-emoji { font-size: 52px; opacity: .2; }
.locked-view h2 { font-size: 22px; font-weight: 900; color: var(--t3); }
.locked-view p { font-size: 13px; color: var(--t3); font-family: 'Nunito Sans', sans-serif; }

/* ── XP BAR ── */
.xp-bar-wrap {
  margin-top: 14px; position: relative;
}
.xp-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px; color: var(--t3); text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 5px;
  display: flex; justify-content: space-between;
}
.xp-track {
  height: 8px; background: var(--s3);
  border-radius: 4px; overflow: hidden;
  border: 1px solid var(--br);
}
.xp-fill {
  height: 100%; border-radius: 4px;
  background: linear-gradient(90deg, var(--green), var(--blue));
  transition: width .6s cubic-bezier(.34,1.56,.64,1);
  box-shadow: 0 0 8px rgba(56,189,248,.4);
}

/* ── MOBILE ── */
@media(max-width: 700px) {
  .sidebar { display: none; }
  .main { padding: 16px 14px 60px; }
  .hero-title { font-size: 22px; }
}

.hamburger {
  display: none; background: none; border: none;
  cursor: pointer; flex-direction: column; gap: 4px; padding: 4px;
}
.hamburger span { width: 20px; height: 2px; background: var(--t2); border-radius: 1px; display: block; }

@media(max-width: 700px) { .hamburger { display: flex; } }

.mobile-menu {
  display: none; position: fixed;
  top: 62px; left: 0; right: 0; bottom: 0;
  background: var(--s1); z-index: 150; overflow-y: auto;
}
/* ── APP LAYOUT (no sidebar now) ── */
.app { display:flex; flex:1; justify-content:center; }
.main { flex:1; max-width:680px; padding:0 16px 80px; overflow-y:auto; height:calc(100vh - 62px); }
.main::-webkit-scrollbar { width:4px; }
.main::-webkit-scrollbar-thumb { background:var(--br); border-radius:2px; }

/* ── MAP VIEW ── */
.map-header { padding:28px 0 20px; }
.map-title { font-size:22px; font-weight:900; color:var(--t1); margin-bottom:6px; }
.map-sub { font-size:13px; color:var(--t2); font-family:'Nunito Sans',sans-serif; }

.unit-block { margin-bottom:10px; }

.unit-banner {
  display:flex; align-items:center; justify-content:space-between;
  background:var(--s1); border:2px solid; border-radius:16px;
  padding:14px 18px; margin-bottom:8px;
}
.unit-banner-left { display:flex; align-items:center; gap:12px; }
.unit-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.unit-name { font-size:14px; font-weight:900; }
.unit-count { font-size:11px; color:var(--t3); font-family:'Share Tech Mono',monospace; margin-top:2px; }
.unit-crown { font-size:22px; }

/* ── LESSON PATH (zigzag) ── */
.lesson-path { display:flex; flex-direction:column; gap:6px; padding:0 10px 10px; }
.path-row { display:flex; }
.path-left  { justify-content:flex-start; }
.path-center{ justify-content:center; }
.path-right { justify-content:flex-end; }

.lesson-node {
  display:flex; align-items:center; gap:14px;
  background:var(--s1); border:2px solid var(--br);
  border-radius:20px; padding:12px 18px 12px 14px;
  cursor:pointer; transition:all .18s;
  text-align:left; max-width:300px; width:100%;
}
.lesson-node:hover:not(:disabled) { background:var(--s2); transform:scale(1.02); }
.lesson-node:disabled { opacity:.35; cursor:not-allowed; }
.node-done { border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.05); }
.node-active { border-color:var(--blue); background:rgba(56,189,248,.06); box-shadow:0 0 20px rgba(56,189,248,.15); }

.node-circle {
  width:52px; height:52px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:24px; flex-shrink:0;
  background:var(--s2); border:3px solid var(--br);
  transition:all .2s;
}
.node-active .node-circle { border-width:3px; animation:nodeGlow 2s infinite; }
@keyframes nodeGlow {
  0%,100% { box-shadow:0 4px 0 rgba(56,189,248,.5), 0 0 12px rgba(56,189,248,.3); }
  50% { box-shadow:0 4px 0 rgba(56,189,248,.7), 0 0 24px rgba(56,189,248,.5); }
}

.node-label { flex:1; min-width:0; }
.node-num { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:1px; font-family:'Share Tech Mono',monospace; }
.node-name { font-size:13px; font-weight:800; color:var(--t1); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.node-progress-bar { height:4px; background:var(--s3); border-radius:2px; margin-top:6px; overflow:hidden; }
.node-progress-fill { height:100%; border-radius:2px; transition:width .4s; }

/* ── LESSON VIEW ── */
.lesson-view { padding:20px 0 60px; }

.lesson-top-bar {
  display:flex; align-items:center; gap:12px; margin-bottom:22px;
}
.back-btn {
  font-family:'Nunito',sans-serif; font-size:12px; font-weight:800;
  color:var(--t2); background:var(--s2); border:1px solid var(--br);
  border-radius:8px; padding:7px 13px; cursor:pointer; white-space:nowrap;
  transition:all .15s; flex-shrink:0;
}
.back-btn:hover { color:var(--t1); border-color:var(--blue); }
.lesson-prog-track { flex:1; height:10px; background:var(--s3); border-radius:5px; overflow:hidden; border:1px solid var(--br); }
.lesson-prog-fill { height:100%; border-radius:5px; transition:width .5s cubic-bezier(.34,1.56,.64,1); }
.lesson-step-count { font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--t3); white-space:nowrap; }

.lesson-hero {
  background:var(--s1); border:2px solid; border-radius:16px;
  padding:18px 20px; margin-bottom:20px;
}
.lesson-hero-top { display:flex; justify-content:space-between; align-items:center; }
.lh-unit { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:2px; font-family:'Share Tech Mono',monospace; margin-bottom:4px; }
.lh-title { font-size:20px; font-weight:900; color:var(--t1); }
.lh-emoji { font-size:40px; line-height:1; }

.sec-header {
  display:flex; align-items:center; gap:14px; margin-bottom:16px;
}
.sec-icon-wrap {
  width:44px; height:44px; border-radius:12px; border:2px solid;
  display:flex; align-items:center; justify-content:center;
  font-size:20px; flex-shrink:0;
}
.sec-label { font-size:16px; font-weight:900; color:var(--t1); }
.sec-sublabel { font-size:11px; color:var(--t3); font-family:'Nunito Sans',sans-serif; margin-top:2px; }

.sec-content { margin-bottom:24px; }

.got-it-btn {
  width:100%; padding:16px;
  font-family:'Nunito',sans-serif; font-size:15px; font-weight:900;
  color:#fff; border:none; border-radius:14px; cursor:pointer;
  transition:all .15s; letter-spacing:.3px;
}
.got-it-btn:hover { filter:brightness(1.1); transform:translateY(-2px); }
.got-it-btn:active { transform:translateY(1px); }

/* ── QUESTION VIEW ── */
.q-header { display:flex; align-items:center; gap:10px; margin-bottom:20px; }
.q-badge {
  font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:1px;
  padding:5px 12px; border-radius:20px; border:1px solid;
  font-family:'Share Tech Mono',monospace;
}
.q-section-tag { font-size:12px; color:var(--t2); font-weight:700; }

.q-card {
  background:var(--s1); border:2px solid var(--br);
  border-radius:18px; padding:22px 20px; margin-bottom:16px;
}
.q-text { font-size:17px; font-weight:800; color:var(--t1); line-height:1.45; margin-bottom:20px; }

.q-opts { display:flex; flex-direction:column; gap:10px; }
.q-opt {
  display:flex; align-items:center; gap:12px;
  background:var(--s2); border:2px solid var(--br);
  border-radius:12px; padding:13px 16px;
  cursor:pointer; transition:all .15s; text-align:left;
}
.q-opt:hover:not(:disabled) { border-color:var(--blue); background:var(--bb); }
.opt-letter {
  width:28px; height:28px; border-radius:8px;
  background:var(--s3); border:1px solid var(--br);
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:900; font-family:'Share Tech Mono',monospace;
  color:var(--t2); flex-shrink:0;
}
.opt-text { font-size:14px; font-weight:700; color:var(--t1); }

.q-opt.opt-correct {
  background:rgba(34,197,94,.12); border-color:var(--green);
}
.q-opt.opt-correct .opt-letter { background:var(--green); color:#fff; border-color:var(--gd); }
.q-opt.opt-wrong {
  background:rgba(248,113,113,.12); border-color:var(--red);
}
.q-opt.opt-wrong .opt-letter { background:var(--red); color:#fff; border-color:#c0392b; }

.feedback-box {
  display:flex; gap:14px; padding:16px 18px;
  border-radius:14px; border:2px solid; align-items:flex-start;
}
.fb-correct { background:rgba(34,197,94,.1); border-color:rgba(34,197,94,.4); }
.fb-wrong   { background:rgba(248,113,113,.1); border-color:rgba(248,113,113,.4); }
.fb-icon { font-size:24px; flex-shrink:0; }
.fb-title { font-size:15px; font-weight:900; color:var(--t1); margin-bottom:4px; }
.fb-explain { font-size:13px; color:var(--t2); font-family:'Nunito Sans',sans-serif; line-height:1.6; }

/* ── COMPLETE SCREEN ── */
.complete-screen {
  display:flex; flex-direction:column; align-items:center;
  text-align:center; padding:48px 20px 60px; gap:16px;
}
.complete-burst { font-size:72px; line-height:1; animation:burst .6s ease-out; }
@keyframes burst { 0%{transform:scale(0) rotate(-20deg);opacity:0;} 70%{transform:scale(1.2) rotate(5deg);} 100%{transform:scale(1) rotate(0);opacity:1;} }
.complete-title { font-size:32px; font-weight:900; color:var(--t1); letter-spacing:-.5px; }
.complete-sub { font-size:14px; color:var(--t2); font-family:'Nunito Sans',sans-serif; }

.complete-stats {
  display:flex; gap:16px; background:var(--s1);
  border:2px solid var(--br); border-radius:18px; padding:20px 28px;
}
.cs-item { display:flex; flex-direction:column; align-items:center; gap:4px; }
.cs-val { font-size:22px; font-weight:900; }
.cs-lbl { font-size:10px; color:var(--t3); text-transform:uppercase; letter-spacing:1px; font-family:'Share Tech Mono',monospace; }

.complete-actions { display:flex; flex-direction:column; gap:12px; width:100%; max-width:320px; }
.complete-next-btn {
  padding:16px; font-family:'Nunito',sans-serif; font-size:15px;
  font-weight:900; color:#fff; border:none; border-radius:14px;
  cursor:pointer; transition:all .15s;
}
.complete-next-btn:hover { filter:brightness(1.1); transform:translateY(-2px); }
.complete-map-btn {
  padding:14px; font-family:'Nunito',sans-serif; font-size:14px;
  font-weight:800; color:var(--t2); background:var(--s2);
  border:2px solid var(--br); border-radius:14px; cursor:pointer;
  transition:all .15s;
}
.complete-map-btn:hover { border-color:var(--blue); color:var(--t1); }

/* ── XP BAR ── */
.xp-bar-wrap { }
.xp-label { font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--t3); text-transform:uppercase; letter-spacing:1px; margin-bottom:5px; display:flex; justify-content:space-between; }
.xp-track { height:8px; background:var(--s3); border-radius:4px; overflow:hidden; border:1px solid var(--br); }
.xp-fill { height:100%; border-radius:4px; background:linear-gradient(90deg,var(--green),var(--blue)); transition:width .6s cubic-bezier(.34,1.56,.64,1); box-shadow:0 0 8px rgba(56,189,248,.4); }

/* ── MOBILE ── */
@media(max-width:600px) {
  .lesson-node { max-width:260px; }
  .lh-title { font-size:16px; }
  .q-text { font-size:15px; }
}

/* ── SETTINGS BUTTON ── */
.settings-btn {
  background:var(--s2); border:1px solid var(--br);
  border-radius:8px; padding:7px 10px; font-size:16px;
  cursor:pointer; transition:all .15s; line-height:1;
}
.settings-btn:hover { border-color:var(--blue); background:var(--bb); }

/* ── HOME SCREEN ── */
.home-screen {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; min-height:calc(100vh - 62px);
  padding:40px 24px; text-align:center; gap:0;
}
.home-flag {
  font-size:72px; line-height:1;
  animation:floatIn .8s ease-out;
  margin-bottom:24px;
}
@keyframes floatIn {
  0% { transform:translateY(-20px); opacity:0; }
  100% { transform:translateY(0); opacity:1; }
}
.home-title {
  font-size:36px; font-weight:900; color:var(--t1);
  letter-spacing:-.5px; line-height:1.1; margin-bottom:10px;
  animation:fadeUp .6s .1s ease-out both;
}
.home-title span { color:var(--green); }
.home-sub {
  font-size:15px; color:var(--t2); font-family:'Nunito Sans',sans-serif;
  line-height:1.6; max-width:340px; margin-bottom:36px;
  animation:fadeUp .6s .2s ease-out both;
}
@keyframes fadeUp {
  0% { transform:translateY(16px); opacity:0; }
  100% { transform:translateY(0); opacity:1; }
}
.home-stats-row {
  display:flex; gap:12px; margin-bottom:40px;
  animation:fadeUp .6s .3s ease-out both;
}
.home-stat {
  background:var(--s1); border:1px solid var(--br);
  border-radius:14px; padding:14px 20px;
  display:flex; flex-direction:column; align-items:center; gap:4px;
}
.home-stat-val { font-size:20px; font-weight:900; }
.home-stat-lbl { font-size:10px; color:var(--t3); text-transform:uppercase; letter-spacing:1px; font-family:'Share Tech Mono',monospace; }
.learn-btn {
  padding:18px 48px; background:var(--green);
  color:#fff; font-family:'Nunito',sans-serif;
  font-size:17px; font-weight:900; border:none;
  border-radius:16px; cursor:pointer; transition:all .2s;
  box-shadow:0 5px 0 var(--gd), 0 0 30px rgba(34,197,94,.3);
  letter-spacing:.3px;
  animation:fadeUp .6s .4s ease-out both;
}
.learn-btn:hover {
  background:#2dda6e; transform:translateY(-3px);
  box-shadow:0 8px 0 var(--gd), 0 0 40px rgba(34,197,94,.4);
}
.learn-btn:active { transform:translateY(1px); box-shadow:0 3px 0 var(--gd); }

/* ── SETTINGS SCREEN ── */
.settings-screen {
  padding:28px 0 60px; max-width:480px;
}
.settings-title {
  font-size:24px; font-weight:900; color:var(--t1);
  margin-bottom:6px; display:flex; align-items:center; gap:10px;
}
.settings-sub {
  font-size:13px; color:var(--t3); font-family:'Nunito Sans',sans-serif;
  margin-bottom:28px;
}
.settings-section-label {
  font-family:'Share Tech Mono',monospace; font-size:9px;
  text-transform:uppercase; letter-spacing:2px; color:var(--t3);
  margin-bottom:10px;
}
.settings-card {
  background:var(--s1); border:1px solid var(--br);
  border-radius:16px; overflow:hidden; margin-bottom:20px;
}
.settings-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 20px; border-bottom:1px solid var(--br); gap:16px;
}
.settings-row:last-child { border-bottom:none; }
.settings-row-left { display:flex; flex-direction:column; gap:3px; }
.settings-row-title { font-size:14px; font-weight:800; color:var(--t1); }
.settings-row-desc { font-size:12px; color:var(--t3); font-family:'Nunito Sans',sans-serif; }
.settings-danger-btn {
  padding:9px 18px; background:transparent;
  border:1px solid rgba(248,113,113,.4); border-radius:8px;
  color:var(--red); font-family:'Nunito',sans-serif;
  font-size:12px; font-weight:800; cursor:pointer; transition:all .15s;
  white-space:nowrap;
}
.settings-danger-btn:hover { background:var(--rb); border-color:var(--red); }
.settings-info-row {
  padding:16px 20px; border-bottom:1px solid var(--br);
  display:flex; justify-content:space-between; align-items:center;
}
.settings-info-row:last-child { border-bottom:none; }
.settings-info-label { font-size:13px; color:var(--t2); font-family:'Nunito Sans',sans-serif; }
.settings-info-val { font-size:13px; font-weight:800; color:var(--t1); font-family:'Share Tech Mono',monospace; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0;
  background:rgba(22,27,39,.97);
  backdrop-filter:blur(14px);
  border-top:1px solid var(--br);
  display:flex; z-index:300;
  padding:0 16px;
  padding-bottom:env(safe-area-inset-bottom);
}
.nav-btn {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:4px; padding:10px 8px;
  background:none; border:none; cursor:pointer;
  transition:all .15s; position:relative;
}
.nav-btn:hover .nav-icon { transform:translateY(-2px); }
.nav-icon {
  font-size:22px; line-height:1;
  transition:transform .15s;
}
.nav-label {
  font-family:'Share Tech Mono',monospace;
  font-size:9px; font-weight:700;
  text-transform:uppercase; letter-spacing:1.5px;
  color:var(--t3); transition:color .15s;
}
.nav-btn.nav-active .nav-label { color:var(--blue); }
.nav-btn.nav-active .nav-icon { filter:drop-shadow(0 0 6px var(--blue)); }
.nav-active-dot {
  position:absolute; bottom:4px;
  width:4px; height:4px; border-radius:50%;
  background:var(--blue);
  box-shadow:0 0 6px var(--blue);
}

/* ── REVIEW SCREEN ── */
.review-screen { padding:20px 0 100px; }
.review-header { margin-bottom:24px; }
.review-title { font-size:24px; font-weight:900; color:var(--t1); margin-bottom:6px; }
.review-sub { font-size:13px; color:var(--t2); font-family:'Nunito Sans',sans-serif; }

.review-tabs {
  display:flex; gap:0; background:var(--s2);
  border:1px solid var(--br); border-radius:12px;
  overflow:hidden; margin-bottom:20px;
}
.review-tab {
  flex:1; padding:11px 10px; font-size:12px; font-weight:900;
  text-align:center; cursor:pointer; border:none;
  background:transparent; color:var(--t3); transition:all .15s;
  font-family:'Nunito',sans-serif;
}
.review-tab.on { background:var(--blue); color:#fff; }
.review-tab:not(.on):hover { background:var(--s3); color:var(--t2); }

.word-grid { display:flex; flex-direction:column; gap:8px; }

.word-card {
  background:var(--s1); border:1px solid var(--br);
  border-radius:12px; padding:13px 16px;
  display:flex; justify-content:space-between;
  align-items:center; gap:12px;
  transition:border-color .15s;
}
.word-card:hover { border-color:var(--br2); }
.wc-left { display:flex; flex-direction:column; gap:3px; }
.wc-dutch { font-size:16px; font-weight:900; color:var(--t1); }
.wc-english { font-size:12px; color:var(--t2); font-family:'Nunito Sans',sans-serif; }
.wc-right { display:flex; align-items:center; gap:8px; flex-shrink:0; }
.wc-note { font-size:11px; color:var(--t3); font-family:'Share Tech Mono',monospace; }

/* ── FLASHCARD ── */
.flashcard-wrap {
  display:flex; flex-direction:column; align-items:center;
  gap:20px; padding:20px 0;
}
.flashcard {
  width:100%; max-width:400px;
  min-height:200px; background:var(--s1);
  border:2px solid var(--br); border-radius:20px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:32px 24px; text-align:center;
  cursor:pointer; transition:all .2s; position:relative;
  user-select:none;
}
.flashcard:hover { border-color:var(--blue); transform:scale(1.02); }
.flashcard.flipped { border-color:var(--green); }
.fc-hint {
  font-family:'Share Tech Mono',monospace; font-size:9px;
  color:var(--t3); text-transform:uppercase; letter-spacing:1.5px;
  margin-bottom:12px;
}
.fc-word { font-size:28px; font-weight:900; color:var(--t1); line-height:1.2; }
.fc-answer { font-size:18px; font-weight:700; color:var(--green); margin-top:10px; }
.fc-article { font-size:12px; font-family:'Share Tech Mono',monospace; margin-top:6px; }

.flashcard-controls {
  display:flex; gap:12px; width:100%; max-width:400px;
}
.fc-btn {
  flex:1; padding:14px; font-family:'Nunito',sans-serif;
  font-size:13px; font-weight:900; border:none;
  border-radius:12px; cursor:pointer; transition:all .15s;
}
.fc-again { background:var(--rb); color:var(--red); border:2px solid rgba(248,113,113,.3); }
.fc-again:hover { background:var(--red); color:#fff; }
.fc-got  { background:var(--gb); color:var(--green); border:2px solid rgba(34,197,94,.3); }
.fc-got:hover { background:var(--green); color:#fff; }

.fc-progress {
  font-family:'Share Tech Mono',monospace; font-size:11px;
  color:var(--t3); text-align:center;
}

.review-empty {
  text-align:center; padding:60px 20px; color:var(--t3);
}
.review-empty-icon { font-size:48px; margin-bottom:14px; opacity:.4; }
.review-empty-text { font-size:14px; font-family:'Nunito Sans',sans-serif; line-height:1.6; }

/* ── QUIZ ── */
.quiz-screen { padding:20px 0 100px; }
.quiz-top-bar { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
.quiz-score-row {
  display:flex; gap:12px; margin-bottom:18px;
}
.quiz-score-pill {
  flex:1; padding:10px 14px; border-radius:10px;
  background:var(--s1); border:1px solid var(--br);
  display:flex; flex-direction:column; align-items:center; gap:2px;
}
.quiz-score-val { font-size:18px; font-weight:900; }
.quiz-score-lbl { font-size:9px; font-family:'Share Tech Mono',monospace; text-transform:uppercase; letter-spacing:1px; color:var(--t3); }

.fill-blank-card {
  background:var(--s1); border:2px solid var(--br);
  border-radius:18px; padding:22px 20px; margin-bottom:16px;
}
.fb-sentence {
  font-size:18px; font-weight:800; color:var(--t1);
  line-height:1.6; margin-bottom:16px;
}
.blank {
  display:inline-block;
  min-width:80px; border-bottom:2px solid var(--blue);
  color:var(--blue); font-weight:900;
  text-align:center; padding:0 4px;
  transition:all .2s;
}
.blank.filled-correct { border-color:var(--green); color:var(--green); }
.blank.filled-wrong   { border-color:var(--red);   color:var(--red);   }

/* ── AI TUTOR ── */
.tutor-btn {
  display:flex; align-items:center; gap:7px; width:100%;
  padding:11px 16px; background:var(--pb);
  border:1px solid rgba(167,139,250,.35); border-radius:12px;
  cursor:pointer; font-family:'Nunito',sans-serif; font-size:13px;
  font-weight:800; color:var(--purple); transition:all .15s; margin-top:12px;
}
.tutor-btn:hover { background:rgba(167,139,250,.25); border-color:var(--purple); }
.tutor-panel {
  background:var(--s1); border:1px solid rgba(167,139,250,.35);
  border-radius:14px; overflow:hidden; margin-top:10px;
}
.tutor-history {
  max-height:260px; overflow-y:auto; padding:14px 16px;
  display:flex; flex-direction:column; gap:10px;
}
.tutor-history::-webkit-scrollbar { width:3px; }
.tutor-history::-webkit-scrollbar-thumb { background:var(--br); border-radius:2px; }
.tutor-msg { display:flex; gap:9px; align-items:flex-start; }
.tutor-msg.user { flex-direction:row-reverse; }
.tutor-av {
  width:26px; height:26px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:13px; background:var(--s2); border:1px solid var(--br);
}
.tutor-bubble {
  max-width:84%; padding:9px 12px; border-radius:11px;
  font-size:13px; font-family:'Nunito Sans',sans-serif; line-height:1.6; color:var(--t1);
}
.tutor-msg.ai .tutor-bubble { background:var(--s2); border:1px solid var(--br); }
.tutor-msg.user .tutor-bubble { background:var(--pb); border:1px solid rgba(167,139,250,.3); }
.tutor-input-row {
  display:flex; gap:8px; padding:10px 12px;
  border-top:1px solid var(--br); background:var(--s2);
}
.tutor-input {
  flex:1; background:var(--s3); border:1px solid var(--br); border-radius:8px;
  padding:9px 12px; font-family:'Nunito Sans',sans-serif; font-size:13px;
  color:var(--t1); outline:none; transition:border-color .15s;
}
.tutor-input:focus { border-color:var(--purple); }
.tutor-input::placeholder { color:var(--t3); }
.tutor-send {
  padding:9px 13px; background:var(--purple); border:none; border-radius:8px;
  cursor:pointer; font-size:15px; box-shadow:0 3px 0 var(--pd); transition:all .15s;
}
.tutor-send:hover { filter:brightness(1.1); transform:translateY(-1px); }
.tutor-send:disabled { opacity:.4; cursor:not-allowed; transform:none; }

/* ── CONVERSATION ── */
.convo-wrap { display:flex; flex-direction:column; height:calc(100vh - 62px - 58px); }
.convo-header { padding:16px 4px 12px; flex-shrink:0; }
.convo-title { font-size:20px; font-weight:900; color:var(--t1); margin-bottom:2px; }
.convo-sub { font-size:12px; color:var(--t2); font-family:'Nunito Sans',sans-serif; }
.convo-msgs {
  flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:12px;
  padding:4px 0 12px;
}
.convo-msgs::-webkit-scrollbar { width:3px; }
.convo-msgs::-webkit-scrollbar-thumb { background:var(--br); border-radius:2px; }
.convo-msg { display:flex; gap:9px; align-items:flex-start; }
.convo-msg.user { flex-direction:row-reverse; }
.convo-av {

const PHASES = [
  { name:"Unit 1 · First Words",    color:"#fb923c", lessons:[1,2,3] },
  { name:"Unit 2 · Building Blocks",color:"#38bdf8", lessons:[4,5,6,7] },

];

const PHASE_COLORS = ["#fb923c","#38bdf8","#22c55e","#a78bfa","#fbbf24","#f472b6"];

function getPhase(n) { return PHASES.find(p=>p.lessons.includes(n)); }
function getPhaseIdx(n) { return PHASES.findIndex(p=>p.lessons.includes(n)); }
function getPhaseColor(n) { return PHASE_COLORS[getPhaseIdx(n)] || "#38bdf8"; }

// ============================================================
// QUESTIONS BANK — 3 questions per lesson generated from data
// ============================================================
function makeQuestions(day) {
  const qs = [];

  // Q1 — from phrases: translate Dutch → English (multiple choice)
  if (day.phrases && day.phrases.length >= 2) {
    const correct = day.phrases[0];
    const wrong = day.phrases.filter((_,i)=>i>0).slice(0,3);
    const opts = [correct.e, ...wrong.map(w=>w.e)].sort(()=>Math.random()-.5);
    qs.push({
      type:'mc',
      section:'phrases',
      q:`What does "${correct.d.split('/')[0].trim()}" mean?`,
      opts, correct: correct.e,
      explain: `"${correct.d}" = ${correct.e}`
    });
  }

  // Q2 — from grammar: fill-in or true/false
  if (day.grammar && day.grammar.rules.length > 0) {
    // Build a true/false from the grammar title
    qs.push({
      type:'tf',
      section:'grammar',
      q:`True or False: In this lesson's grammar topic — "${day.grammar.title}" — the verb goes to the second position in a Dutch main clause (V2 rule).`,
      correct:'True',
      opts:['True','False'],
      explain: 'The V2 rule means the verb is always in second position in Dutch main clauses.'
    });
  }

  // Q3 — from vocab: Dutch word → English
  if (day.vocab && day.vocab.length >= 3) {
    const correct = day.vocab[Math.floor(Math.random()*Math.min(day.vocab.length,5))];
    const wrongs = day.vocab.filter(v=>v.d!==correct.d).slice(0,3).map(v=>v.e);
    const opts = [correct.e, ...wrongs].slice(0,4).sort(()=>Math.random()-.5);
    qs.push({
      type:'mc',
      section:'vocab',
      q:`What is the Dutch word "${correct.d}" in English?`,
      opts, correct: correct.e,
      explain: `"${correct.d}" means "${correct.e}"${correct.g ? ` (article: ${correct.g})` : ''}`
    });
  }

  // Q4 — from insights or mistakes: spot the mistake
  if (day.mistakes && day.mistakes.length > 0) {
    const m = day.mistakes[0];
    qs.push({
      type:'mc',
      section:'mistakes',
      q:`Which is the CORRECT Dutch form?`,
      opts: [m.w.split('→')[0].trim(), m.r.split('(')[0].trim(), 'Both are correct','Neither is correct'].slice(0,4).sort(()=>Math.random()-.5),
      correct: m.r.split('(')[0].trim(),
      explain: m.x
    });
  }

  return qs.slice(0, 4);
}

// ============================================================
// LESSON SECTIONS
// ============================================================
function getLessonSections(day) {
  const sections = [];
  if (day.phrases && day.phrases.length) sections.push({id:'phrases',label:'Key Phrases',icon:'🗣️'});
  if (day.grammar) sections.push({id:'grammar',label:'Grammar',icon:'📐'});
  if (day.sentences && day.sentences.length) sections.push({id:'sentences',label:'Sentences',icon:'✏️'});
  if (day.vocab && day.vocab.length) sections.push({id:'vocab',label:'Vocabulary',icon:'📖'});
  if (day.insights && day.insights.length) sections.push({id:'insights',label:'Insights',icon:'💡'});
  if (day.mistakes && day.mistakes.length) sections.push({id:'mistakes',label:'Watch Out',icon:'⚠️'});
  if (day.cultural) sections.push({id:'cultural',label:'Culture',icon:'🌷'});
  if (day.dialogue && day.dialogue.length) sections.push({id:'dialogue',label:'Dialogue',icon:'💬'});
  return sections;
}

let state = {
  current: parseInt(localStorage.getItem('a1_cur') || '1'),
  done: JSON.parse(localStorage.getItem('a1_done') || '[]'),
  lessonStep: JSON.parse(localStorage.getItem('a1_lstep') || '{}'),
  view: 'map',
};

function save() {
  localStorage.setItem('a1_cur', state.current);
  localStorage.setItem('a1_done', JSON.stringify(state.done));
  localStorage.setItem('a1_lstep', JSON.stringify(state.lessonStep));
}

function maxUnlocked() {
  if (state.done.length === 0) return 1;
  return Math.max(...state.done) + 1;
}

// MAP VIEW — Duolingo-style path
// ============================================================
function renderMap() {
  state.view = 'map';
  setNav('learn');
  document.getElementById('bottomNav').style.display = 'flex';
  const main = document.getElementById('main');
  const xp = Math.round((state.done.length / 30) * 100);

  let html = `
  <div class="map-header">
    <button class="back-btn" style="margin-bottom:16px;" onclick="renderHome()">← Home</button>

    <div class="map-sub">30 lessons · 6 units · Learn to speak, read and understand Dutch</div>
    <div class="xp-bar-wrap" style="max-width:420px;margin-top:14px;">
      <div class="xp-label"><span>⭐ Overall Progress</span><span>${state.done.length}/30 · ${xp}%</span></div>
      <div class="xp-track"><div class="xp-fill" style="width:${xp}%"></div></div>
    </div>
  </div>`;

  PHASES.forEach((phase, pi) => {
    const pc = PHASE_COLORS[pi];
    const pDone = phase.lessons.every(n => state.done.includes(n));
    const pStarted = phase.lessons.some(n => state.done.includes(n));

    html += `
    <div class="unit-block">
      <div class="unit-banner" style="border-color:${pc};background:${pc}18">
        <div class="unit-banner-left">
          <div class="unit-dot" style="background:${pc}"></div>
          <div>
            <div class="unit-name" style="color:${pc}">${phase.name}</div>
            <div class="unit-count">${phase.lessons.length} lessons · ${phase.lessons.filter(n=>state.done.includes(n)).length} complete</div>
          </div>
        </div>
        ${pDone ? `<div class="unit-crown">👑</div>` : ''}
      </div>
      <div class="lesson-path">`;

    phase.lessons.forEach((n, li) => {
      const lesson = DAYS.find(d => d.day === n);
      const isDone = state.done.includes(n);
      const unlocked = maxUnlocked();
      const isActive = !isDone && n === unlocked;
      const isLocked = n > unlocked;
      const step = state.lessonStep[n] || 0;
      const sections = getLessonSections(lesson);
      const sectionsDone = isDone ? sections.length : step;

      let nodeCls = 'lesson-node';
      if (isDone) nodeCls += ' node-done';
      else if (isActive) nodeCls += ' node-active';
      else if (isLocked) nodeCls += ' node-locked';

      // zigzag: alternate left/center/right
      const offsets = ['path-left','path-center','path-right','path-center'];
      const posClass = offsets[li % 4];

      html += `
        <div class="path-row ${posClass}">
          <button class="${nodeCls}" onclick="${isLocked ? '' : `openLesson(${n})`}" ${isLocked ? 'disabled' : ''}>
            <div class="node-circle" style="${isDone ? `background:${pc};border-color:${pc};box-shadow:0 4px 0 ${pc}99,0 0 18px ${pc}66` : isActive ? `border-color:${pc};box-shadow:0 4px 0 ${pc}88,0 0 20px ${pc}44` : ''}">
              ${isDone ? '⭐' : isLocked ? '🔒' : lesson.icon}
            </div>
            <div class="node-label">
              <div class="node-num" style="color:${isActive||isDone ? pc : 'var(--t3)'}">Lesson ${n}</div>
              <div class="node-name">${lesson.topic}</div>
              ${!isDone && !isLocked ? `<div class="node-progress-bar"><div class="node-progress-fill" style="width:${Math.round((sectionsDone/Math.max(sections.length,1))*100)}%;background:${pc}"></div></div>` : ''}
            </div>
          </button>
        </div>`;
    });

    html += `</div></div>`;
  });

  main.innerHTML = html;
}

// ============================================================
// LESSON VIEW — section by section with questions
// ============================================================
let lessonQ = { questions:[], qIdx:0, answered:false, selected:null };

function openLesson(n) {
  if (n > maxUnlocked()) return;
  state.current = n;
  state.view = 'lesson';
  const step = state.lessonStep[n] || 0;
  save();
  renderLesson(n, step);
}

function renderLesson(n, step) {
  const day = DAYS.find(d => d.day === n);
  const sections = getLessonSections(day);
  const questions = makeQuestions(day); // static fallback
  const pc = getPhaseColor(n);
  const phase = getPhase(n);
  const totalSteps = sections.length + questions.length;

  if (step >= totalSteps) { renderLessonComplete(n, pc, phase); return; }

  const isQuestionStep = step >= sections.length;
  if (isQuestionStep) {
    const qIdx = step - sections.length;
    // Try AI question first, fall back to static
    renderQuestion(n, step, totalSteps, questions[qIdx], pc, sections);
    // Async upgrade: replace with AI question if available
    const sec = sections[Math.min(qIdx, sections.length-1)];
    makeAIQuestion(day, sec.id).then(aiQ => {
      // Only upgrade if user is still on this step
      if (_qCtx.n === n && _qCtx.step === step) {
        _qCtx.q = aiQ;
        // Re-render question options only
        const optsEl = document.getElementById('qOpts');
        if (optsEl && !optsEl.querySelector('.opt-correct')) {
          optsEl.innerHTML = aiQ.opts.map((opt,i) => `
            <button class="q-opt" id="opt${i}" onclick="selectAnswer(${i})">
              <span class="opt-letter">${['A','B','C','D'][i]}</span>
              <span class="opt-text">${opt}</span>
            </button>`).join('');
          const qtext = document.querySelector('.q-text');
          if (qtext) qtext.textContent = aiQ.q;
        }
      }
    }).catch(()=>{}); // silent fail = keep static question
  } else {
    renderSection(n, step, totalSteps, sections[step], day, pc, phase);
  }
}

function renderSection(n, step, totalSteps, sec, day, pc, phase) {
  const main = document.getElementById('main');
  const isDone = state.done.includes(n);
  const progress = Math.round((step / totalSteps) * 100);

  let content = '';
  switch(sec.id) {
    case 'phrases':
      content = '<div class="phrases-grid">' + day.phrases.map(p=>`
        <div class="phrase-card">
          <div class="p-dutch">${p.d}</div>
          <div class="p-right">
            <div class="p-english">${p.e}</div>
            ${p.p ? `<div class="p-pronounce">${p.p}</div>` : ''}
          </div>
        </div>`).join('') + '</div>';
      break;
    case 'grammar':
      content = `<div class="grammar-card">${day.grammar.rules.map(r=>`<div class="grammar-rule">${r}</div>`).join('')}</div>`;
      break;
    case 'sentences':
      content = day.sentences.map(s => {
        const chips = s.b.map(w => {
          const [word,tag] = w.split('=');
          let cls = 'chip';
          if (tag&&tag.includes('(s)')) cls+=' s';
          else if (tag&&tag.includes('(v')) cls+=' v';
          else if (tag&&tag.includes('(o)')) cls+=' o';
          return `<span class="${cls}">${word} = ${tag||''}</span>`;
        }).join('');
        return `<div class="sentence-card"><div class="s-dutch">${s.d}</div><div class="s-english">${s.e}</div><div class="chips">${chips}</div></div>`;
      }).join('');
      break;
    case 'vocab':
      content = `<table class="vocab-table"><thead><tr><th>Dutch</th><th>English</th><th>Notes</th></tr></thead><tbody>` +
        day.vocab.map(v=>`<tr>
          <td><span class="v-dutch">${v.d}</span>${v.g?`<span class="gtag ${v.g==='de'?'g-de':'g-het'}">${v.g}</span>`:''}</td>
          <td class="ven">${v.e}</td>
          <td class="vnote">${v.n||'—'}</td>
        </tr>`).join('') + '</tbody></table>';
      break;
    case 'insights':
      content = '<div class="insights-card">' + day.insights.map(i=>`<div class="insight-row"><span class="i-icon">${i.i}</span><span>${i.t}</span></div>`).join('') + '</div>';
      break;
    case 'mistakes':

// ── REVIEW QUIZ ENGINE ──
let _rqCtx = {}; // current question context
let _rqState = { questions:[], idx:0, score:0 };

function buildReviewQuestions() {
  const pool = [];
  const allWords = getLearnedWords();

  state.done.forEach(n => {
    const day = DAYS.find(d => d.day === n);
    if (!day) return;
    const pc = getPhaseColor(n);

    // Q1: Dutch → English vocab
    if (day.vocab && day.vocab.length >= 2) {
      day.vocab.forEach(v => {
        const wrongs = allWords.filter(w => w.d !== v.d).sort(()=>Math.random()-.5).slice(0,3).map(w=>w.e);
        if (wrongs.length < 2) return;
        const opts = [v.e, ...wrongs].slice(0,4).sort(()=>Math.random()-.5);
        pool.push({ pc, category:'Vocabulary',
          q: `What does "${v.d}" mean?`,
          opts, correct: v.e,
          explain: `"${v.d}" = ${v.e}${v.g ? ` · article: ${v.g}` : ''}${v.n ? ` · ${v.n}` : ''}`
        });
      });
    }

    // Q2: English → Dutch vocab
    if (day.vocab && day.vocab.length >= 2) {
      const v = day.vocab[Math.floor(Math.random() * day.vocab.length)];
      const wrongs = allWords.filter(w => w.d !== v.d).sort(()=>Math.random()-.5).slice(0,3).map(w=>w.d);
      if (wrongs.length >= 2) {
        const opts = [v.d, ...wrongs].slice(0,4).sort(()=>Math.random()-.5);
        pool.push({ pc, category:'Vocabulary',
          q: `How do you say "${v.e}" in Dutch?`,
          opts, correct: v.d,
          explain: `"${v.e}" in Dutch is "${v.d}"${v.g ? ` (${v.g})` : ''}`
        });
      }
    }

    // Q3: de/het article
    if (day.vocab) {
      const withArticle = day.vocab.filter(v => v.g);
      if (withArticle.length >= 1) {
        const v = withArticle[Math.floor(Math.random() * withArticle.length)];
        const wrong = v.g === 'de' ? 'het' : 'de';
        const opts = [v.g, wrong, 'een', 'geen'].sort(()=>Math.random()-.5);
        pool.push({ pc, category:'Articles',
          q: `What is the correct article for "${v.d}" (${v.e})?`,
          opts, correct: v.g,
          explain: `It's "${v.g} ${v.d}". ${v.g==='de' ? 'De-words are common gender (~67%).' : 'Het-words are neuter gender (~33%).'}`
        });
      }
    }

    // Q4: Fill in the blank from sentences
    if (day.sentences && day.sentences.length >= 1) {
      day.sentences.forEach(s => {
        const words = s.d.split(' ');
        if (words.length < 4) return;
        const candidates = words.slice(1,-1).filter(w => w.replace(/[.,!?]/g,'').length > 2 && /[a-zA-ZÀ-ÿ]/.test(w));
        if (!candidates.length) return;
        const raw = candidates[Math.floor(Math.random() * candidates.length)];
        const blankWord = raw.replace(/[.,!?]/g,'');
        const sentence = s.d.replace(raw, '___');
        const distractors = allWords.map(w=>w.d.split(' ')[0]).filter(w=>w!==blankWord&&w.length>1).sort(()=>Math.random()-.5).slice(0,3);
        if (distractors.length < 2) return;
        const opts = [blankWord, ...distractors].slice(0,4).sort(()=>Math.random()-.5);
        pool.push({ pc, category:'Fill in the Blank', isFill:true,
          q: sentence, translation: s.e,
          opts, correct: blankWord,
          explain: `Full sentence: "${s.d}" — ${s.e}`
        });
      });
    }

    // Q5: Spot the mistake
    if (day.mistakes && day.mistakes.length >= 1) {
      day.mistakes.forEach(m => {
        const wrong = m.w.split('→')[0].trim().split('(')[0].trim();
        const right = m.r.split('(')[0].trim();
        if (!wrong || !right || wrong === right || wrong.length > 50 || right.length > 50) return;
        const opts = [right, wrong, 'Both are correct', 'Neither is correct'].sort(()=>Math.random()-.5);
        pool.push({ pc, category:'Common Mistakes',
          q: `Which is correct Dutch?`,
          opts, correct: right,
          explain: m.x
        });
      });
    }

    // Q6: Grammar MC
    if (day.grammar && day.grammar.rules.length >= 2) {
      const cleanRule = r => r.replace(/<[^>]+>/g,'').trim();
      const correct = cleanRule(day.grammar.rules[0]).slice(0,70);
      const fakes = [
        'Dutch verbs always go to the start of a sentence.',
        'All Dutch nouns use "het" as the article.',
        'Dutch word order is identical to English.',
        'There is no difference between de and het in Dutch.',
        'Dutch adjectives never change their ending.',
      ].sort(()=>Math.random()-.5).slice(0,3);
      const opts = [correct, ...fakes].slice(0,4).sort(()=>Math.random()-.5);
      pool.push({ pc, category:'Grammar: ' + day.grammar.title.split(':')[0],
        q: `About "${day.grammar.title}" — which statement is correct?`,
        opts, correct,
        explain: cleanRule(day.grammar.rules[0])
      });
    }
  });

  // Shuffle, deduplicate by question text, cap at 25
  const seen = new Set();
  return pool.filter(q => { if (seen.has(q.q)) return false; seen.add(q.q); return true; })
             .sort(() => Math.random() - .5)
             .slice(0, 25);
}

function startReviewQuiz() {
  const qs = buildReviewQuestions();
  if (!qs.length) { renderReview('words'); return; }

  // Mark vocab questions with their word for strength tracking
  qs.forEach(q => {
    const match = getLearnedWords().find(w => q.correct === w.d || q.correct === w.e);
    if (match) q._word = match.d;
  });

  // Sort: prioritise due/weak words first
  const dueWords = new Set(getDueWords().map(w => w.d));
  qs.sort((a,b) => {
    const aWeak = dueWords.has(a._word) ? 0 : 1;
    const bWeak = dueWords.has(b._word) ? 0 : 1;
    return aWeak - bWeak;
  });

  _rqState = { questions: qs, idx: 0, score: 0 };

  // Try to async-upgrade first few questions with AI
  const words = getDueWords().slice(0, 3);
  words.forEach((w, i) => {
    makeAIReviewQuestion(w).then(aiQ => {
      if (_rqState.idx === 0) { // only if quiz not started yet
        qs.unshift({
          isFill: true, pc: getPhaseColor(w.lesson),
          category: 'AI Fill in the Blank',
          q: aiQ.sentence, translation: aiQ.translation,
          opts: aiQ.opts, correct: aiQ.correct,
          explain: aiQ.explain, _word: w.d
        });
      }
    }).catch(()=>{});
  });

  renderReviewQuizQuestion();
}

    </div>

    <div class="q-card">
      ${q.isFill
        ? `<div class="q-text" style="font-size:15px;">${q.q.replace('___','<span style="display:inline-block;min-width:60px;border-bottom:2px solid var(--blue);color:var(--blue);text-align:center;" id="theBlank">___</span>')}</div>
           <div style="font-size:12px;color:var(--t3);font-family:\'Nunito Sans\',sans-serif;margin-bottom:16px;font-style:italic;">${q.translation}</div>`

      <div class="q-opts">

          <button class="q-opt" id="ropt${i}" onclick="selectRQ(${i})">

          </button>`).join('')}
      </div>
    </div>

    <div id="rqFeedback"></div>
  </div>`;
}

function selectRQ(idx) {
  const { q } = _rqCtx;
  const selected = q.opts[idx];
  const isCorrect = selected.trim() === q.correct.trim();
  if (isCorrect) _rqState.score++;

  // Track word strength if vocab question
  if (q._word) updateStrength(q._word, isCorrect);

  if (q.isFill) {
    const blank = document.getElementById('theBlank');

  document.getElementById('rqFeedback').innerHTML = `

  main.innerHTML = `

function startFlashcards() {
  const words = getLearnedWords();
  if (words.length === 0) { renderReview('words'); return; }
  // Shuffle
  _reviewState.fcWords = [...words].sort(() => Math.random() - .5);
  _reviewState.fcIdx = 0;
  _reviewState.fcFlipped = false;
  _reviewState.fcScore = { got:0, again:0 };
  renderFlashcard();
}

function renderFlashcard() {
  _reviewState.tab = 'flash';
  const main = document.getElementById('main');
  const words = _reviewState.fcWords.length ? _reviewState.fcWords : getLearnedWords().sort(()=>Math.random()-.5);
  _reviewState.fcWords = words;

  if (words.length === 0) { renderReview('words'); return; }

  const idx = _reviewState.fcIdx;
  const total = words.length;

  // All cards done
  if (idx >= total) {
    const {got, again} = _reviewState.fcScore;
    const pc = '#38bdf8';
    main.innerHTML = `
    <div class="review-screen">

  main.innerHTML = `

    <div class="xp-bar-wrap" style="margin-bottom:18px;">
      <div class="xp-label"><span>Card ${idx+1} of ${total}</span><span>${_reviewState.fcScore.got} got it · ${_reviewState.fcScore.again} again</span></div>
      <div class="xp-track"><div class="xp-fill" style="width:${xp}%;background:${pc}"></div></div>
    </div>

    <div class="flashcard-wrap">
      <div class="flashcard ${flipped?'flipped':''}" onclick="flipCard()">
        <div class="fc-hint">${flipped ? 'English' : 'Tap to reveal → Dutch'}</div>
        <div class="fc-word">${flipped ? w.e : w.d}</div>
        ${flipped && w.g ? `<div class="fc-article"><span class="gtag ${w.g==='de'?'g-de':'g-het'}">${w.g}</span> ${w.d}</div>` : ''}

        <button class="fc-btn fc-got" onclick="fcAnswer(true)">✓ Got it</button>

function flipCard() {
  _reviewState.fcFlipped = !_reviewState.fcFlipped;

}

function fcAnswer(got) {
  if (got) _reviewState.fcScore.got++;
  else _reviewState.fcScore.again++;
  _reviewState.fcIdx++;
  _reviewState.fcFlipped = false;
  renderFlashcard();
}

const AI_MODEL = 'claude-sonnet-4-20250514';

async function callClaude(systemPrompt, userMessage) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: AI_MODEL,
      max_tokens: 1000,
      system: systemPrompt,
      messages: [{ role: 'user', content: userMessage }]
    })
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error?.message || 'API error');
  return data.content.map(b => b.text || '').join('');
}

// ── SPACED REPETITION ──
// wordStrength: { 'dutch_word': { strength:0-5, seen:0, correct:0, nextReview: timestamp } }
let wordStrength = JSON.parse(localStorage.getItem('a1_ws') || '{}');

function saveWS() { localStorage.setItem('a1_ws', JSON.stringify(wordStrength)); }

function getStrength(dutch) { return (wordStrength[dutch] || {}).strength || 0; }

function updateStrength(dutch, correct) {
  const w = wordStrength[dutch] || { strength:0, seen:0, correct:0 };
  w.seen++;
  if (correct) { w.strength = Math.min(5, w.strength + 1); w.correct++; }
  else { w.strength = Math.max(0, w.strength - 1); }
  // Next review interval: 1,2,4,8,16 days based on strength
  const days = [1,1,2,4,8,16][w.strength];
  w.nextReview = Date.now() + days * 86400000;
  wordStrength[dutch] = w;
  saveWS();
}

function getDueWords() {
  const now = Date.now();
  return getLearnedWords().filter(w => {
    const ws = wordStrength[w.d];
    if (!ws) return true; // never seen = due
    return ws.nextReview <= now || ws.strength < 3;
  });
}

function getWeakWords() {
  return getLearnedWords()
    .map(w => ({ ...w, strength: getStrength(w.d) }))
    .sort((a,b) => a.strength - b.strength);
}

// ── AI TUTOR (in lessons) ──
let _tutorHistory = {}; // keyed by lessonNum_sectionId
let _tutorCtx = {}; // current tutor context

function getTutorKey(n, secId) { return `${n}_${secId}`; }

function showTutor(n, secId, topic) {
  const key = getTutorKey(n, secId);
  if (!_tutorHistory[key]) _tutorHistory[key] = [];
  _tutorCtx = { n, secId, topic, key };

  const panel = document.getElementById('tutorPanel');
  if (panel) {
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    if (panel.style.display === 'block') renderTutorHistory();

}

function renderTutorHistory() {
  const hist = _tutorHistory[_tutorCtx.key] || [];
  const box = document.getElementById('tutorHistory');
  if (!box) return;
  if (hist.length === 0) {
    box.innerHTML = `<div style="color:var(--t3);font-size:13px;font-family:'Nunito Sans',sans-serif;text-align:center;padding:8px 0;">Ask me anything about this section! 🤓</div>`;
  } else {
    box.innerHTML = hist.map(m => `
      <div class="tutor-msg ${m.role}">
        <div class="tutor-av">${m.role==='ai'?'🤖':'👤'}</div>
        <div class="tutor-bubble">${m.text}</div>
      </div>`).join('');
    box.scrollTop = box.scrollHeight;
  }
}

async function sendTutor() {
  const input = document.getElementById('tutorInput');
  const btn = document.getElementById('tutorSendBtn');
  const q = input.value.trim();
  if (!q || btn.disabled) return;

  const { key, topic, n } = _tutorCtx;
  const day = DAYS.find(d => d.day === n);

  if (!_tutorHistory[key]) _tutorHistory[key] = [];
  _tutorHistory[key].push({ role:'user', text: q });
  input.value = '';
  btn.disabled = true;
  renderTutorHistory();

  // Add typing indicator
  const box = document.getElementById('tutorHistory');
  if (box) {
    box.innerHTML += `<div class="tutor-msg ai" id="typing"><div class="tutor-av">🤖</div><div class="tutor-bubble" style="opacity:.5;font-style:italic;">Thinking...</div></div>`;
    box.scrollTop = box.scrollHeight;
  }

  const sysPrompt = `You are a friendly Dutch language tutor teaching A1 level Dutch. 
The student is currently studying: "${topic}" from Lesson ${n} (${day?.topic || ''}).
Keep answers short (2-4 sentences), clear, and encouraging. Use simple English. 
Add Dutch examples when helpful. Never be condescending. If they ask something off-topic, gently redirect to Dutch learning.`;

  const history = _tutorHistory[key].slice(0,-1).map(m => `${m.role==='user'?'Student':'Tutor'}: ${m.text}`).join('\n');
  const fullQ = history ? `${history}\nStudent: ${q}` : q;

  try {
    const reply = await callClaude(sysPrompt, fullQ);
    const typing = document.getElementById('typing');
    if (typing) typing.remove();
    _tutorHistory[key].push({ role:'ai', text: reply });
    renderTutorHistory();
  } catch(e) {
    const typing = document.getElementById('typing');
    if (typing) typing.remove();
    _tutorHistory[key].push({ role:'ai', text: '⚠️ Couldn\'t connect. Check your internet connection and try again.' });
    renderTutorHistory();
  }
  btn.disabled = false;
}

function tutorKeypress(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendTutor(); }
}

// ── AI LESSON QUESTIONS ──
async function makeAIQuestion(day, sectionId) {
  const sysPrompt = `You are a Dutch A1 language teacher. Generate ONE multiple choice question testing the student on what they just read.
Return ONLY valid JSON in this exact format (no markdown, no explanation):
{"q":"question text","opts":["option A","option B","option C","option D"],"correct":"exact text of correct option","explain":"brief explanation of the correct answer"}
Rules: question must be clear, options must all be plausible, correct must be one of the opts exactly, explain in English in max 2 sentences.`;

  const content = sectionId === 'grammar'
    ? `Grammar topic: ${day.grammar?.title}. Rules: ${day.grammar?.rules?.map(r=>r.replace(/<[^>]+>/g,'')).join(' | ')}`
    : sectionId === 'vocab'
    ? `Vocabulary: ${day.vocab?.map(v=>`${v.d}=${v.e}`).join(', ')}`
    : sectionId === 'phrases'
    ? `Key phrases: ${day.phrases?.map(p=>`${p.d}=${p.e}`).join(', ')}`
    : `Topic: ${day.topic}. Content: ${day.cultural || day.insights?.map(i=>i.t).join(' ')}`;

  const raw = await callClaude(sysPrompt, `Generate a question for this A1 Dutch content: ${content}`);
  const clean = raw.replace(/```json|```/g,'').trim();
  const parsed = JSON.parse(clean);
  return { ...parsed, section: sectionId, pc: '#38bdf8' };
}

// ── AI REVIEW QUESTIONS ──
async function makeAIReviewQuestion(word) {
  const sysPrompt = `You are a Dutch A1 language teacher. Generate ONE fill-in-the-blank question using the Dutch word "${word.d}" (${word.e}).
Return ONLY valid JSON (no markdown):
{"sentence":"Dutch sentence with ___ where the word goes","translation":"English translation of full sentence","correct":"${word.d}","opts":["${word.d}","wrong1","wrong2","wrong3"],"explain":"why this word fits here"}
Rules: sentence must be natural A1 Dutch, wrong options must be similar-looking or same grammatical category words, explain in 1-2 sentences English.`;

  const raw = await callClaude(sysPrompt, `Make a fill-in-the-blank for: ${word.d} (${word.e})`);
  const clean = raw.replace(/```json|```/g,'').trim();
  return JSON.parse(clean);
}

function convoKeypress(e) {

async function sendConvo() {
  const input = document.getElementById('convoInput');
  const btn = document.getElementById('convoSendBtn');
  const text = input.value.trim();
  if (!text || btn.disabled) return;

  _convoMessages.push({ role:'user', text, correction: null });
  input.value = '';
  input.style.height = 'auto';
  btn.disabled = true;

  // Re-render with user message
  renderConversation();
  const msgs = document.getElementById('convoMsgs');

  // Add typing indicator
  if (msgs) {
    msgs.innerHTML += `<div class="convo-msg ai" id="convoTyping"><div class="convo-av">🤖</div><div class="convo-bubble" style="opacity:.5;font-style:italic;">...</div></div>`;
    msgs.scrollTop = msgs.scrollHeight;
    btn.disabled = true;
  }

  const lessonsDone = state.done.length;
  const knownWords = getLearnedWords().map(w=>`${w.d}=${w.e}`).slice(0,60).join(', ');

  const sysPrompt = `You are a warm, encouraging Dutch A1 language tutor having a conversation practice session.
The student has completed ${lessonsDone} lessons. Known vocabulary includes: ${knownWords || 'basic greetings'}.

Rules:
1. Always respond in Dutch at A1 level — short, simple sentences.
2. After your Dutch response, add an English translation in brackets [like this].
3. If the student made a Dutch grammar/spelling mistake, add a brief gentle correction after a line break starting with "✏️ Correction:".
4. If they write in English, encourage them to try in Dutch, give a model Dutch sentence they could use.
5. Keep the conversation natural — ask follow-up questions, react to what they say.
6. Never be critical. Always be warm and encouraging.
7. Maximum 3-4 sentences per response.`;

  const history = _convoMessages.slice(-8).map(m => `${m.role==='user'?'Student':'Tutor'}: ${m.text}`).join('\n');

  try {
    const reply = await callClaude(sysPrompt, history);

    // Parse correction if present
    let mainText = reply;
    let correction = null;
    if (reply.includes('✏️ Correction:')) {
      const parts = reply.split('✏️ Correction:');
      mainText = parts[0].trim();
      correction = parts[1].trim();
    }

    _convoMessages.push({ role:'ai', text: mainText, correction });
    renderConversation();
  } catch(e) {
    _convoMessages.push({ role:'ai', text: '⚠️ Connection issue. Check your internet and try again.', correction: null });
    renderConversation();
  }
}
